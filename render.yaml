services:
  - type: web
    name: accountant-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot:app --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MY_TELEGRAM_ID
        sync: false
      - key: DB_PATH
        value: accountant.db
